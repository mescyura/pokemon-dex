<!doctype html>
<html lang="uk">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>The Pokémon Dex</title>
		<link
			rel="shortcut icon"
			href="assets/img/favicon.png"
			type="image/x-icon"
		/>
		<script src="https://cdn.tailwindcss.com"></script>
	</head>
	<body
		class="bg-gray-100 min-h-screen font-sans transition-colors duration-300"
	>
		<header class="bg-red-600 text-white p-6 shadow-lg sticky top-0 z-50">
			<div
				class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4"
			>
				<a href="./" class="flex items-center gap-2">
					<img class="w-20 h-auto" src="assets/img/logo.png" alt="" />
					<h1 class="text-2xl font-bold tracking-wider">Pokémon Dex</h1>
				</a>

				<div class="flex justify-items-stretch gap-3 w-full md:w-auto">
					<input
						type="text"
						id="searchInput"
						placeholder="Пошук по імені або ID..."
						class="p-2 rounded-lg text-black w-full md:w-64 outline-none focus:ring-4 focus:ring-yellow-400"
					/>

					<select
						id="typeFilter"
						class="p-2 rounded-lg text-black outline-none cursor-pointer"
					>
						<option value="all">Усі типи</option>
					</select>
				</div>
			</div>
		</header>

		<main class="container mx-auto p-6">
			<div
				id="pokemonGallery"
				class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"
			></div>
		</main>

		<div
			id="modalOverlay"
			class="fixed inset-0 bg-black/70 z-[60] flex items-center justify-center hidden p-4"
		>
			<div
				id="modalContent"
				class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto relative p-6"
			>
				<button
					id="closeModal"
					class="absolute top-4 right-4 text-3xl font-bold"
				>
					&times;
				</button>
				<div id="pokemonDetails"></div>
			</div>
		</div>

		<script type="module" src="assets/js/main.js"></script>
	</body>
</html>
